  # ── DOCUMENTS & FINANCIAL ──────────────────────────────────
  - id: docs_id_copies
    category: documents
    label: "Identity Document Copies"
    description: "Waterproof copies of passports, IDs, medical cards, insurance"
    unit: sets
    unit_label: "sets"
    base_qty: 1
    per_person_multiplier: 0
    duration_multiplier: 0
    duration_unit: days
    flat_override: true
    min_total: 1
    max_total: 3
    rounding: ceil
