# ----------------------
# GLOBAL OVERRIDE RULES
# ----------------------
# Applied after all item formulas resolve — cross-cutting rules
global_overrides:
  - id: conflict_zone_multiplier
    description: "Active conflict zone multiplies all critical items by 1.5"
    condition: "regional_threat_level >= 8"
    affected_categories: [water, food, medical]
    operator: multiply
    value: 1.5

  - id: urban_shelter_in_place
    description: "Urban shelter-in-place scenario extends duration floor"
    condition: "scenario_type == 'shelter_in_place' AND location_type == 'urban'"
    affected_items: [water_drinking, food_nonperishable_calories]
    operator: set_min_duration_days
    value: 14

  - id: evacuation_bag_weight_limit
    description: "Evacuation scenario caps per-person carry weight at 20kg"
    condition: "scenario_type == 'evacuation'"
    operator: apply_weight_limit_kg
    value: 20
    priority_order_by: category_priority  # drop lowest priority first

# ----------------------
# FORMULA RESOLVER RULES
# ----------------------
formula_resolution_order:
  1: "Apply flat_override items (ignore duration)"
  2: "Apply conditional_on gate — skip item if condition false"
  3: "Compute: raw_qty = base_qty + (per_person_multiplier * group_size)"
  4: "If not flat_override: raw_qty = raw_qty * duration_multiplier * duration_days"
  5: "Apply special_case_overrides in order (set → add → multiply)"
  6: "Apply min_total clamp (max(raw_qty, min_total))"
  7: "Apply max_total clamp if set (min(raw_qty, max_total))"
  8: "Apply rounding rule (ceil | floor | round | two_decimal | none)"
  9: "Apply global_overrides"
  10: "Return resolved_qty with unit and label"
